<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malika IT - Trade and Supplier</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header container -->
    <div id="header-container"></div>

    <!-- Main content area - all sections will be loaded here -->
    <main id="main-content">
        <div id="home-container"></div>
        <div id="services-container"></div>
        <div id="products-container"></div>
        <div id="about-container"></div>
        <div id="career-container"></div>
        <div id="team-container"></div>
        <div id="contact-container"></div>
    </main>

    <!-- Footer container -->
    <div id="footer-container"></div>

    <!-- Back to top button -->
    <button id="backToTop" class="back-to-top" title="Back to Top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Redirect script for hash URLs -->
    <script>
        // Redirect any hash URLs to clean URLs
        if (window.location.hash) {
            const section = window.location.hash.substring(1);
            const validSections = ['home', 'services', 'products', 'about', 'career', 'team', 'contact'];
            if (validSections.includes(section)) {
                window.location.href = '/' + (section === 'home' ? '' : section);
            }
        }
    </script>

    <script src="js/main.js"></script>
</body>
</html>
